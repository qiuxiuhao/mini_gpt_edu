project_name: mini_gpt_edu
stage: stage3_single_head_attention

data:
  raw_text_path: data/raw.txt
  train_ratio: 0.9

model:
  block_size: 64
  n_embd: 128
  head_size: 128

train:
  batch_size: 32
  max_iters: 1000
  eval_interval: 100
  eval_iters: 20
  learning_rate: 0.001
  seed: 42
  device: auto

output:
  checkpoint_dir: checkpoints
  best_ckpt_name: single_head_attention_best.pt
  tokenizer_name: tokenizer.json
