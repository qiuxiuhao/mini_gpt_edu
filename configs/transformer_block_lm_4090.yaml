project_name: mini_gpt_edu
stage: stage5_transformer_block

data:
  raw_text_path: data/computer_knowledge/raw/full_corpus.txt
  train_ratio: 0.9

model:
  block_size: 256
  n_embd: 256
  n_head: 8
  n_layer: 1
  dropout: 0.1

train:
  batch_size: 64
  max_iters: 10000
  eval_interval: 500
  eval_iters: 100
  learning_rate: 0.001
  seed: 42
  device: auto

output:
  checkpoint_dir: checkpoints
  best_ckpt_name: transformer_block_lm_4090_best.pt
  tokenizer_name: tokenizer_4090.json
